version: 1
# ПРИМЕЧАНИЕ: Некоторые поля (имеющие _template в имени) должны быть указаны с
# использованием языка шаблонов go https://pkg.go.dev/text/template#pkg-overview с
# дополнительными функциями из пакета slim-sprig, доступными для обработки:
# https://go-task.github.io/slim-sprig. Во всех случаях переменная .Context (строка)
# доступна и устанавливается в имя поля для уникальной идентификации контекста обработки.
# контекста.
document:
  # Некоторые программы (CoolReader и некоторые версии FBReader) ожидают "старый" формат zip,
  # который не содержит дескриптора данных. Если вы когда-либо столкнетесь с
  # нечитаемыми файлами epub/kepub, включите эту опцию.
  fix_zip: false
  # Открывать книгу с титульной страницы, а не с начала текста
  #   ПРИМЕЧАНИЕ: игнорируется на устройствах Kindle
  open_from_cover: true
  # Тип иерархии навигации для оглавлений/карт навигации устройства.
  # "normal" - сохранить вложенность разделов
  # "old_kindle" - ограничить вложенность для совместимости со старыми версиями Kindle/kindlegen
  # "flat" - сделать все элементы навигации соседними
  #   Примечание: сгенерированные видимые страницы оглавления должны
  #   сохранять своюобычную/полную структуру.
  toc_type: normal
  # Таблица стилей CSS для использования. Если отсутствует, будет предоставлена ​​таблица
  # стилей по умолчанию.
  stylesheet_path: "profile/fbc-traum-v01.css"
  # Если задано output_name_template, имя выходного файла будет создано с помощью FB2.
  # metainformation
  #
  # Список доступных переменных:
  # - .Title (строка) - название книги, как указано в metainformation fb2
  #
  # - .Series (массив { .Name (строка), .Number (целое число) }) - серия, как
  #      указано в metainformation fb2.
  #   ПРИМЕЧАНИЕ: согласно схеме fictionbook, серии могут быть иерархическими (серии
  #   содержат серии и так далее). Иерархия полностью игнорируется - все, что ниже
  #   первого уровня, здесь отсутствует.
  #
  # - .Language (строка) - каноническое строковое представление языка, как
  #      указано в metainformation fb2
  #
  # - .Date (строка) - дата, как указано в metainformation fb2.
  #   ПРИМЕЧАНИЕ: Если указан действительный атрибут xs:date "value", он будет использован.
  #   В противном случае — просто текст, как определено.
  #
  # - .Authors (массив { .FirstName (строка), .MiddleName (строка),
  #     .LastName (строка)}), как указано в метаинформации fb2.
  #
  # - .Format (строка) — строка, представляющая запрошенное преобразование (например:
  #     epub2, epub3, kepub...).
  #
  # - .SourceFile (строка) — базовая часть имени исходного файла (без пути, без
  #     расширения).
  #
  # - .BookID (строка) — UUID книги, как указано в метаинформации fb2 или
  #     назначено конвертером.
  #
  # - .Genres (массив строк) — названия жанров, как указано в метаинформации fb2.
  #   Примечание: следите за разделителями путей, будут созданы каталоги!

  # =============================================================================
  # МОДИФИЦИРОВАННЫЙ ШАБЛОН: иерархия [lang]/[letter]/[author]/[series?]/file
  # =============================================================================
  output_name_template: |
    {{- $lang := .Language -}}
    {{- if not $lang }}{{ $lang = "unknown" }}{{ end -}}
    {{- $lang -}}/
    {{- $author := first .Authors -}}
    {{- $lastName := "" -}}
    {{- if $author }}{{ $lastName = $author.LastName }}{{ end -}}
    {{- if not $lastName }}{{ $lastName = "unknown" }}{{ end -}}
    {{- /* Безопасное извлечение первого Unicode-символа */ -}}
    {{- $chars := splitList "" $lastName -}}
    {{- $firstRune := index $chars 0 -}}
    {{- $firstLetter := upper $firstRune -}}
    {{- if not $firstLetter }}{{ $firstLetter = "A" }}{{ end -}}
    {{- $firstLetter -}}/
    {{- $authorDir := $lastName -}}
    {{- if $author }}{{ if $author.FirstName }}{{ $authorDir = printf "%s %s" $authorDir $author.FirstName }}{{ end -}}{{ end -}}
    {{- if $author }}{{ if $author.MiddleName }}{{ $authorDir = printf "%s %s" $authorDir $author.MiddleName }}{{ end -}}{{ end -}}
    {{- $authorDir -}}/
    {{- $title := .Title | default "unknown_title" -}}
    {{- /* Проверка на нескольких авторов */ -}}
    {{- $collabTag := "" -}}
    {{- if gt (len .Authors) 1 -}}
      {{- $collabTag = "(Сб)" -}}
    {{- end -}}
    {{- if and .Series (gt (len .Series) 0) -}}
      {{- $series := first .Series -}}
      {{- $seriesName := $series.Name | default "unknown_series" -}}
      {{- $seriesName = replace "/" "-" $seriesName -}}
      {{- $seriesName = replace "\\" "-" $seriesName -}}
      {{- $seriesName = replace ":" "-" $seriesName -}}
      {{- $seriesName -}}/
      {{- $titleSafe := $title -}}
      {{- $titleSafe = replace "/" "-" $titleSafe -}}
      {{- $titleSafe = replace "\\" "-" $titleSafe -}}
      {{- $titleSafe = replace ":" "-" $titleSafe -}}
      {{- if and $series.Number (gt $series.Number 0) -}}
        {{- printf "%s %02d %s%s" $lastName $series.Number $titleSafe $collabTag -}}
      {{- else -}}
        {{- printf "%s 00 %s%s" $lastName $titleSafe $collabTag -}}
      {{- end -}}
    {{- else -}}
      {{- $titleSafe := $title -}}
      {{- $titleSafe = replace "/" "-" $titleSafe -}}
      {{- $titleSafe = replace "\\" "-" $titleSafe -}}
      {{- $titleSafe = replace ":" "-" $titleSafe -}}
      {{- $titleSafe = replace "*" "-" $titleSafe -}}
      {{- printf "%s - %s%s" $lastName $titleSafe $collabTag -}}
    {{- end -}}
  # Преобразование имени выходного файла в формат слаг/транслитерация -
  # после завершения всей остальной обработки файла
  # Имя файла создано
  file_name_transliterate: false
  # Вставляйте мягкие дефисы '\u00AD' внутри слов — для устройств, которые не
  # поддерживают правильную расстановку переносов
  #   ПРИМЕЧАНИЕ: это может конфликтовать со встроенной расстановкой переносов
  #   в программе просмотра, например в современных устройствах Kindle
  #   расстановка переносов всегда включена для русского языка
  #   (и выключена для английского)
  insert_soft_hyphen: true

  metainformation:
    #   ПРИМЕЧАНИЕ: при генерации метаинформации OPF для epub2/kepub calibre:series
    #   используются теги с первой доступной коллекцией, для метаинформации epub3
    #   содержит все доступные коллекции
    # Если установлен title_template, метаинформация названия книги будет
    # отформатирована с его использованием. Это часто используется для удобной
    # сортировки списков устройств в библиотеке.
    #
    # Список доступных переменных:
    #
    # - .Title (строка) - название книги, как указано в метаинформации fb2
    #
    # - .Series (массив { .Name (строка), .Number (целое число) }) - серия, как
    #    указано в метаинформации fb2.
    #   ПРИМЕЧАНИЕ: согласно схеме fictionbook, серии могут быть иерархическими (серии
    #   содержат серии и так далее). Иерархия полностью игнорируется - все, что ниже
    #   первого уровня, здесь отсутствует.
    #
    # - .Language (строка) - каноническое строковое представление языка, как
    #    указано в метаинформации fb2
    #
    # - .Date (строка) - дата, как указано в метаинформации fb2.
    #   ПРИМЕЧАНИЕ: Если указан действительный атрибут xs:date "value", он будет использован.
    #   В противном случае — просто текст, как определено.
    #
    # - .Authors (массив { .FirstName (строка), .MiddleName (строка), .LastName
    #    (строка)}) в соответствии с метаинформацией fb2
    #
    # - .Format (строка) — строка, представляющая запрошенное преобразование (например: epub2,
    #    epub3, kepub...)
    #
    # - .SourceFile (строка) — базовая часть имени исходного файла (без пути, без
    #    расширения)
    #
    # - .BookID (строка) — UUID книги, указанный в метаинформации fb2 или
    #    назначенный конвертером
    #
    # - .Genres (массив строк) — названия жанров, указанные в метаинформации fb2
    #    метаинформация
    title_template: |
      {{- if gt (len .Series) 0 -}}
      {{-   with first .Series -}}
      {{-     $seriesLetters := list -}}
      {{-     range $word := splitList " " .Name -}}
      {{-       $seriesLetters = append $seriesLetters (upper (first (splitList "" $word))) -}}
      {{-     end -}}
      {{-     if gt (len $seriesLetters) 0 -}}
      {{-       "(" }}{{- join "" $seriesLetters -}}
      {{-       if gt .Number 0 -}}
      {{-         printf " - %02d" .Number -}}
      {{-       end -}}
      {{-       ") " -}}
      {{-     end -}}
      {{-   end -}}
      {{- end -}}
      {{  .Title -}}
    # Если задан параметр creator_name_template, имя автора(ов) в выходной
    # книге будет отформатировано с его помощью.
    #
    # Метаинформация будет отформатирована с использованием этого параметра. Шаблон применяется к каждому
    # доступному автору индивидуально. Устройство часто использует определенный формат для
    # сортировки книг по именам авторов. Доступны следующие поля:
    # - .Index (целое число) - индекс с 0 (если авторов больше одного)
    # - .FirstName (строка),
    # - .MiddleName (строка),
    # - .LastName (строка)
    creator_name_template: |
      {{- .LastName -}}
      {{- if .FirstName }} {{.FirstName}}{{ end -}}
      {{- if .MiddleName }} {{.MiddleName }}{{ end -}}
    # Преобразовать в транслитерацию название книги и имена авторов — после завершения
    # всех остальных операций обработка завершена
    transliterate: false
  page_map:
    # При возможности сгенерируйте карту страницы
    enable: false
    # Приблизительный размер страницы в кодовых точках Unicode, минимальный размер = 500
    size: 2300
    # Adobe RMSDK/ADE не поддерживает NCX pageList. Он использует свой собственный
    # проприетарный способ — если вы хотите его использовать, установите
    # adobe_de в значение true. Это приведет к тому, что EpubCheck выдаст ошибку
    # ERROR(RSC-005): OEBPS/content.opf: Error while parsing file: attribute "page-map"
    # not allowed here; expected attribute "id".
    #   ПРИМЕЧАНИЕ: актуально только для EPUB2/KEPUB
    adobe_de: false
  images:
    # Не пропускайте изображения, которые не могут быть декодированы программой. Используйте их без
    # какой-либо обработки, позволяя читателю самому решить, что с ними делать.
    use_broken: false
    # Устройства Kindle eInk плохо обрабатывают прозрачные изображения. Эта опция
    # удаляет прозрачность из изображений PNG и GIF, сводя их к белому фону.
    # ПРИМЕЧАНИЕ: для вывода на Kindle это поведение применяется автоматически.
    remove_transparency: false
    # Изменить размер всех изображений (кроме обложки) в соответствии с указанным
    # соотношением сторон
    scale_factor: 1.0
    # Пересжимает все поддерживаемые изображения (в настоящее время JPEG, PNG). Для качества JPEG
    # учитывает "jpeg_quality_level": если обнаруженный уровень для изображения выше,
    # чем запрошенное изображение, оно будет перекодировано. Для PNG наилучший уровень сжатия
    # всегда указывается. Дополнительно запускает определение оттенков серого для
    # изображений JPEG. ПРИМЕЧАНИЕ: для вывода на Kindle некоторое преобразование все еще происходит, даже
    # если эта функция отключена, поскольку растровые изображения нормализуются в JPEG и SVG
    # изображения растрируются.
    optimize: true
    # Уровень качества JPEG для использования, процентные пункты (40% - 100%). Для Kindle
    # вывод также влияет на преобразование PNG/GIF в JPEG и растеризацию SVG.
    jpeg_quality_level: 95
    screen:
      # Размер экрана устройства для чтения, чтобы изображения можно было правильно настроить
      # Используется для подготовки обложки и некоторых других операций, таких как SVG
      # Kindle
      #width: 1264
      #height: 1680
      # Kobo elipsa
      width: 1404
      height: 1872
    cover:
      # Если у книги нет изображения обложки, предоставьте его. Для форматов Amazon
      # Эта функция всегда включается автоматически.
      generate: false
      # Какое изображение использовать в качестве обложки по умолчанию,
      # если требуется изображение по умолчанию. Если требуется, но не указано,
      # программа будет использовать внутренний ресурс
      # default_image_path = "default_cover.jpeg"

      # Как обрабатывать изображение обложки
      # "none" - ничего не делать (для вывода на Kindle обрабатывается как "keepAR")
      # "keepAR" - если высота изображения меньше указанной, изменить размер до
      # указанной высоты, сохраняя соотношение сторон
      # "stretch" - безусловно изменить размер до указанной ширины и высоты
      resize: stretch
  footnotes:
    # Как отображать сноски в книге
    # "по умолчанию" - без специальной обработки, сноски - обычные ссылки
    # "плавающий" - всплывающие сноски (результат зависит от поддержки ридера).
    # "floatRenumbered" - то же самое, что и float, но ссылки и заголовки сносок используют
    # последовательную нумерацию, управляемую label_template.
    #   ПРИМЕЧАНИЕ: фактически сгенерированное содержимое будет соответствовать требованиям к
    #   формату вывода для например, с плавающими сносками для epub2 и kepub, метод
    #   "двунаправленных ссылок" (A -> B и B -> A), а для epub3 это будут <aside> и
    #   обязательные элементы <epub>
    mode: default
    # Названия текстов в документе fb2, которые следует учитывать при обработке сносок
    # если требуется указанным режимом
    bodies: ["notes", "comments", "примечания", "комментарии"]
    # В тексте плавающей заметки обратные ссылки на исходный контент будут представлены
    # этой строкой
    backlinks: "[<]"
    # Если плавающая заметка содержит более одного абзаца, эта строка может быть
    # показана в начале первого абзаца (.css footnote-more
    # управляет видимостью)
    more_paragraphs: "(~)\u00A0"
    # Если указан параметр floatRenumbered, этот шаблон будет использоваться для форматирования текста,
    # отображаемого в сносках. Доступны следующие поля:
    # - .BodyTitle (строка) - может быть пустым
    # - .BodyNumber (целое число) - индекс с 1
    # - .NoteTitle (строка) - может быть пустым
    # - .NoteNumber (целое число) - индекс с 1
    #   ПРИМЕЧАНИЕ: если в книге только один основной текст со сносками, .BodyNumber будет
    #   установлен в 0
    label_template: |
      {{- if gt .BodyNumber 0 -}}
      {{-   printf "%d" .BodyNumber -}}.
      {{- end -}}
      {{- printf "%d" .NoteNumber -}}
  annotation:
    # Создать отдельную "главу" с аннотациями к книге, если таковые имеются.
    enable: true
    # Используйте предоставленный заголовок аннотации
    title: Annotation
    # Отображение аннотаций в оглавлении (сгенерированная страница, ncx, навигация и т. д.)
    in_toc: true
  toc_page:
    # Создать дополнительную страницу с оглавлением (некоторые устройства могут не
    # поддерживать оглавление в формате epub) вообще
    # "none" - не создавать
    # "before" - в начале книги
    # "after" - в конце книги
    placement: before
    # Когда запрошена генерация страницы оглавления и установлен authors_template - страница
    # будет содержать заголовок (заголовок) с авторами, отформатированными с его использованием
    # Список доступных переменных:
    # - .Title (строка) - название книги, как указано в метаинформации fb2
    # - .Series (массив { .Name (строка), .Number (целое число) }) - серия, как
    # указано в метаинформации fb2.
    # ПРИМЕЧАНИЕ: согласно схеме fictionbook, серии могут быть иерархическими (серии
    # содержат серии и так далее). Иерархия полностью игнорируется - все, что ниже
    # первого уровня, отбрасывается.
    # ПРИМЕЧАНИЕ: Аналогично, мне неизвестно об использовании нескольких серий, например,
    # Calibre поддерживает только одну. Поэтому в некоторых случаях внутри
    # конвертер использует только первую доступную серию.
    # # - .Language (строка) - каноническое строковое представление языка, как
    # указано в метаинформации fb2
    # - .Date (строка) - дата, как указано в метаинформации fb2.
    # ПРИМЕЧАНИЕ: Если указан действительный атрибут xs:date "value", он будет использован.
    # В противном случае — просто текст, как определено.
    # - .Authors (массив { .FirstName (строка), .MiddleName (строка), .LastName
    # (строка)}) в соответствии с метаинформацией fb2
    # - .Format (строка) — строка, представляющая запрошенное преобразование (например: epub2,
    # epub3, kepub...)
    # - .SourceFile (строка) — базовая часть имени исходного файла (без пути, без
    # расширения)
    # - .BookID (строка) — UUID книги, указанный в метаинформации fb2 или
    # назначенный конвертером
    # - .Genres (массив строк) — названия жанров, указанные в метаинформации fb2
    # метаинформация
    authors_template: |
      {{- $names := list -}}
      {{- range .Authors -}}
      {{-   $name := list -}}
      {{-   if .FirstName -}}{{ $name = append $name .FirstName -}}{{- end -}}
      {{-   if .MiddleName -}}{{ $name = append $name .MiddleName -}}{{- end -}}
      {{-   if .LastName -}}{{ $name = append $name .LastName }}{{- end -}}
      {{-   $names = append $names (join " " $name) -}}
      {{- end -}}
      {{- join ", " $names -}}
    # Включать главы без названия в оглавление — это предотвращает появление пустого
    # оглавления в «неправильных» книгах.
    # добавление глав без названия в оглавление.
    include_chapters_without_title: false
  # Изображения для виньеток можно указать для названия книги (заголовок основного текста), главы,
  # заголовка и конца главы (разделы первого уровня в основном тексте), а также для
  # заголовков и концов вложенных разделов (вложенные разделы внутри глав). Каждый
  # элемент может отсутствовать (отключаться), быть установлен как "встроенный" (конвертер будет использовать
  # изображения по умолчанию) или иметь путь к существующему допустимому файлу изображения.
  # ПРИМЕЧАНИЕ: субтитры не поддерживаются для автоматического создания виньеток.
  # vignettes:
  #   book:
  #     title_top: builtin
  #     title_bottom: builtin
  #   chapter:
  #     title_top: builtin
  #     title_bottom: builtin
  #     end: builtin
  #   section:
  #     title_top: builtin
  #     title_bottom: builtin
  #     end: builtin
  dropcaps:
    # Allow automatic dropcap styling
    enable: false
    # Characters to ignore when styling dropcaps
    ignore_symbols: "'\"-.…0123456789\u2012\u2013\u2014\u00AB\u00BB\u201C\u201D<>"
  text_transformations:
    # Может использоваться для автоматического исправления некоторых распространенных
    # проблем со старыми файлами FB2 во время преобразования. Применяется только к
    # обычным абзацам основного текста (не к заголовкам, стихотворениям, цитатам и т. д.).
    # Это в основном устаревший контент, и в идеале это не должно быть необходимостью
    #   ПРИМЕЧАНИЕ: Порядок операций жестко задан: речь -> тире -> диалог и
    #   в настоящее время не может быть изменен
    # В начале текста абзаца, начинающегося с символа Unicode, включенного
    # в строку "from", за которым может следовать любое количество символов пробела Unicode,
    # заменяется строкой "to"
    speech:
      enable: false
      from: "‐‑−–—―"
      to: "— "
    # Любой символ Юникода, содержащийся в строке "from" и окруженный пробелами
    # Юникода, заменяется первым символом Юникода из строки "to".
    dashes:
      enable: false
      from: "‐‑−–—―"
      to: "—"
    # Последовательность начальных пробелов Unicode, за которыми следует любой символ Unicode
    # включенный в строку "from" заменяется строкой "to", за которой следует этот
    # символ Unicode.
    dialogue:
      enable: false
      from: "‐‑−–—―"
      to: " "
logging:
  # управляет выводом в терминал (stdout, stderr)
  console:
    # Уровень логирования
    # "none" - подавление логирования файлов
    # "normal" - выводятся сообщения уровня INFO и выше
    # "debug" - выводится весь вывод логов
    level: normal
  #---- управляет записью в файл (может дублировать сообщения CONSOLE)
  file:
    # Как обрабатывать выходной файл во время последовательных запусков программы
    # "append" - сохранять все старые сообщения журнала, добавлять новые в конце
    # "overwrite" - сохранять только сообщения с последнего запуска, журнал перезаписывается
    destination: fb2cng.log
    level: debug
    mode: append
# При запуске программы с опцией "отладка" файл отчета создается в указанном месте назначения.
# Он содержит полный журнал отладки и другие материалы, которые помогут
# в устранении неполадок.
reporting:
  # может быть относительно текущего рабочего каталога.
  destination: fb2cng-report.zip
